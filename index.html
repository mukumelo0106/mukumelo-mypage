<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <title>Mukumelo My Page</title>

  <style>
    body{
      margin:0;
      font-family:"Hiragino Sans","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,#fff7fb,#ffeef6);
      color:#6b4b5d;
      text-align:center;
    }

    .container{
      max-width:420px;
      margin:0 auto;
      padding:24px 16px;
    }

    .title{
      font-size:26px;
      font-weight:700;
      color:#d86b9b;
      margin-top:20px;
    }

    .subtitle{
      font-size:13px;
      color:#9b7488;
      margin-top:6px;
    }

    .card{
      background:rgba(255,255,255,0.88);
      border-radius:28px;
      padding:24px 18px;
      margin-top:24px;
      box-shadow:0 10px 28px rgba(240,160,190,.25);
    }

    .name{
      font-size:22px;
      font-weight:700;
      margin-bottom:16px;
    }

    .info-box{
      background:#fff4fa;
      border-radius:20px;
      padding:16px;
      margin-top:14px;
    }

    .label{
      font-size:12px;
      color:#d86b9b;
      font-weight:700;
    }

    .value{
      font-size:20px;
      font-weight:700;
      margin-top:4px;
    }

    .button{
      display:block;
      margin-top:16px;
      padding:14px;
      border-radius:999px;
      background:linear-gradient(135deg,#f7a8ca,#f4bfd7);
      color:#fff;
      text-decoration:none;
      font-weight:700;
      box-shadow:0 6px 16px rgba(244,160,195,.35);
    }

    .debug{
      margin-top:18px;
      font-size:11px;
      color:#999;
      word-break:break-all;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="title">
    Mukumelo My Page ♡
  </div>

  <div class="subtitle">
    ご注文状況・ポイントを確認できます
  </div>

  <div class="card">

    <div class="name">
      読み込み中...
    </div>

    <div class="info-box">
      <div class="label">🎀 Rank</div>
      <div class="value" id="rank">
        Gold Member
      </div>
    </div>

    <div class="info-box">
      <div class="label">💎 Point</div>
      <div class="value" id="point">
        320 pt
      </div>
    </div>

    <div class="info-box">
      <div class="label">📦 現在のお取引</div>
      <div class="value" id="status">
        デザイン作成中
      </div>
    </div>

    <a class="button" href="#">
      現在のお取引を見る
    </a>

    <a class="button" href="#">
      過去のオーダーを見る
    </a>

    <div class="debug" id="debug"></div>

  </div>

</div>

<script>

function debug(text){
  document.getElementById("debug").innerHTML += "<br>" + text;
}

async function main(){

  try{

    debug("LIFF初期化開始");

    await liff.init({
      liffId:"2010027859-mkcbSVpr"
    });

    debug("LIFF初期化OK");

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    debug("LINEログインOK");

    document.querySelector(".name").innerHTML =
      profile.displayName + " 様♡";

    debug(profile.userId);

  }catch(error){

    debug(error.message);

  }

}

main();

</script>

</body>
</html>
