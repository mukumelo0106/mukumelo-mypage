<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <title>Mukumelo My Page</title>

  <style>

    body{
      margin:0;
      font-family:"Hiragino Sans","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,#fff7fb,#ffeef6);
      color:#6b4b5d;
      text-align:center;
    }

    .container{
      max-width:420px;
      margin:0 auto;
      padding:24px 16px;
    }

    .title{
      font-size:26px;
      font-weight:700;
      color:#d86b9b;
      margin-top:20px;
    }

    .subtitle{
      font-size:13px;
      color:#9b7488;
      margin-top:6px;
    }

    .card{
      background:rgba(255,255,255,0.88);
      border-radius:28px;
      padding:24px 18px;
      margin-top:24px;
      box-shadow:0 10px 28px rgba(240,160,190,.25);
    }

    .name{
      font-size:22px;
      font-weight:700;
      margin-bottom:16px;
    }

    .info-box{
      background:#fff4fa;
      border-radius:20px;
      padding:16px;
      margin-top:14px;
    }

    .label{
      font-size:12px;
      color:#d86b9b;
      font-weight:700;
    }

    .value{
      font-size:20px;
      font-weight:700;
      margin-top:4px;
    }

    .button{
      display:block;
      margin-top:16px;
      padding:14px;
      border-radius:999px;
      background:linear-gradient(135deg,#f7a8ca,#f4bfd7);
      color:#fff;
      text-decoration:none;
      font-weight:700;
      box-shadow:0 6px 16px rgba(244,160,195,.35);
    }

    .debug{
      margin-top:18px;
      font-size:11px;
      color:#999;
      word-break:break-all;
      line-height:1.7;
    }

    .loading{
      animation:blink 1.2s ease-in-out infinite;
      color:#d86b9b;
    }

    @keyframes blink{
      0%{
        opacity:0.35;
      }

      50%{
        opacity:1;
      }

      100%{
        opacity:0.35;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <div class="title">
    Mukumelo My Page ♡
  </div>

  <div class="subtitle">
    ご注文状況・ポイントを確認できます
  </div>

  <div class="card">

    <div class="name loading">
      読み込み中...
    </div>

    <div class="info-box">
      <div class="label">🎀 Rank</div>

      <div class="value loading" id="rank">
        読み込み中...
      </div>
    </div>

    <div class="info-box">
      <div class="label">💎 Point</div>

      <div class="value loading" id="point">
        読み込み中...
      </div>
    </div>

    <div class="info-box">
      <div class="label">📦 現在のお取引</div>

      <div class="value loading" id="status">
        読み込み中...
      </div>
    </div>

    <a class="button" href="#">
      現在のお取引を見る
    </a>

    <a class="button" href="#">
      過去のオーダーを見る
    </a>

    <div class="debug" id="debug"></div>

  </div>

</div>

<script>

function debug(text){
  document.getElementById("debug").innerHTML += "<br>" + text;
}

function kintoneCallback(data){

  debug("kintone連携OK");

  document.getElementById("rank").classList.remove("loading");
  document.getElementById("point").classList.remove("loading");
  document.getElementById("status").classList.remove("loading");

  document.getElementById("rank").innerHTML =
    data.rank;

  document.getElementById("point").innerHTML =
    data.point + " pt";

  document.getElementById("status").innerHTML =
    data.status;

}

async function main(){

  try{

    debug("LIFF初期化開始");

    await liff.init({
      liffId:"2010027859-mkcbSVpr"
    });

    debug("LIFF初期化OK");

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    debug("LINEログインOK");

    document.querySelector(".name").innerHTML =
      profile.displayName + " 様♡";

    document.querySelector(".name").classList.remove("loading");

    debug(profile.userId);

    const GAS_URL =
      "https://script.google.com/macros/s/AKfycbyK42U_SndIImFMrP0eyv2Je_MXEkkjtV6LTitt1DSEqif2mV9Dh3vZN4rk-J3bKCY/exec";

    const script = document.createElement("script");

    script.src =
      GAS_URL +
      "?callback=kintoneCallback" +
      "&userId=" + encodeURIComponent(profile.userId) +
      "&displayName=" + encodeURIComponent(profile.displayName);

    document.body.appendChild(script);

  }catch(error){

    debug("エラー");
    debug(error.message);

  }

}

main();

</script>

</body>
</html>
